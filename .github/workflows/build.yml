name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows / ${{ matrix.toolchain }} / x64 / ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        toolchain: [msvc, clang-cl]
        config: [Debug, Release]
        include:
          - toolchain: msvc
            toolset_arg: ''
          - toolchain: clang-cl
            toolset_arg: '-T ClangCL'

    steps:
      - uses: actions/checkout@v7

      - name: Configure (CMake)
        run: cmake -S . -B build -A x64 ${{ matrix.toolset_arg }} -DMOORING_WARNINGS_AS_ERRORS=ON

      - name: Build (${{ matrix.config }})
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mooring-windows-${{ matrix.toolchain }}-${{ matrix.config }}-x64
          path: |
            build/${{ matrix.config }}/mooring.lib
            build/examples/${{ matrix.config }}/scan_self.exe
          if-no-files-found: error

      # The runner image legitimately has hooks / instrumentation
      # (Defender, telemetry, etc.) so mooring's exit code here is
      # informational, not a CI pass/fail signal. We still want the
      # output in the log to spot regressions in the scan path.
      - name: Run scan_self against runner
        shell: pwsh
        continue-on-error: true
        run: .\build\examples\${{ matrix.config }}\scan_self.exe
