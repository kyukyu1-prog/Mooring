name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-msvc:
    name: Windows / MSVC / x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Configure (CMake)
        run: cmake -S . -B build -A x64 -DMOORING_WARNINGS_AS_ERRORS=ON

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mooring-windows-msvc-x64
          path: |
            build/Release/mooring.lib
            build/examples/Release/scan_self.exe
          if-no-files-found: error

      # The runner image legitimately has hooks / instrumentation
      # (Defender, telemetry, etc.) so mooring's exit code here is
      # informational, not a CI pass/fail signal. We still want the
      # output in the log to spot regressions in the scan path.
      - name: Run scan_self against runner
        shell: pwsh
        continue-on-error: true
        run: .\build\examples\Release\scan_self.exe
